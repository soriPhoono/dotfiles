---
- name: Install chaotic-AUR
  ansible.builtin.import_tasks: chaotic-aur.yml

- name: Copy files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - etc/pam.d/passwd
    - etc/pam.d/system-login
    - etc/plymouth/plymouthd.conf
    - etc/ssh/sshd_config.d/20-deny_root.conf
    - etc/ssh/sshd_config.d/20-force_publickey_auth.conf
    - etc/sudoers.d/10-wheel
    - etc/mkinitcpio.conf
    - etc/pacman.conf
    - etc/paru.conf

- name: Install tools
  become: true
  ansible.builtin.package:
    name:
      - paru
      - pacman-contrib
      - reflector

      - plymouth
      - plymouth-theme-dna-git

      - libpwquality
      - firewalld

      - tailscale
    state: present
  notify:
    - Enable paccache.timer
    - Enable reflector.timer
    - Enable firewalld.service
    - Enable bluetooth.service

- name: Query initramfs
  become: true
  ansible.builtin.stat:
    path: /boot/initramfs-linux-zen.img
  register: ansible_stat

- name: Rebuild initramfs
  become: true
  ansible.builtin.command:
    cmd: mkinitcpio -P
  when:
    - ansible_stat.stat.exists
    - ansible_stat.stat.mtime < ansible_date_time.epoch | int
  changed_when:
    - ansible_stat.stat.exists
    - ansible_stat.stat.mtime < ansible_date_time.epoch | int

- name: Configure bootloader
  become: true
  ansible.builtin.lineinfile:
    path: "/boot/loader/entries/linux-zen.conf"
    line: "options plymouth.use-simpledrm splash quiet"
    insertafter: "^options"  # Adjust this to place the line appropriately
    state: present

- name: Deploy dotfiles
  ansible.builtin.import_tasks: dotfiles.yml

- name: Deploy userspace
  ansible.builtin.import_tasks: userspace.yml
