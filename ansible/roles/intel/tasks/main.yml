# tasks file for ansible/roles/drivers/intel
# This role installs the Intel GPU driver for Intel graphics cards.
# It is designed to work with Arch linux.

# The role performs the following tasks:
# 1. Check if the system is running Arch Linux.
# 2. Check if the system has an Intel GPU.
# 3. Install the Intel GPU driver using the package manager.
# 4. Set up hardware acceleration for the integrated Intel GPU.
# 5. If the system does not have an integrated GPU check if the GPU is a dedicated card.
# 6. If the system has a dedicated Intel GPU, install opencl acceleration.

---
- name: Check if the system is running Arch Linux
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Archlinux"
    fail_msg: "This role is only supported on Arch Linux."
    success_msg: "System is running Arch Linux."

- name: Check if the system has an Intel GPU
  ansible.builtin.shell: |
    set -o pipefail
    lspci | grep -i display | grep -iq "intel"
  register: gpu_check
  changed_when: false

- name: Check if the system has an Intel GPU
  ansible.builtin.assert:
    that:
      - gpu_check.rc == 0
    fail_msg: "This role is only supported on systems with Intel GPUs."
    success_msg: "System has an Intel GPU."

- name: Install the Intel GPU driver
  become: true
  ansible.builtin.package:
    name:
      - mesa
      - xf86-video-intel
      - vulkan-intel

      - lib32-mesa
      - lib32-vulkan-intel

      - clinfo

      - ocl-icd
      - opencl-rusticl-mesa

      - lib32-ocl-icd
      - lib32-opencl-rusticl-mesa
    state: present

- name: Prompt for hardware accleration support
  ansible.builtin.pause:
    prompt: "Do you want to install hardware acceleration support (mesa)? (y/n)"
  register: intel_integrated

- name: Detect hardware acceleration configuration file
  ansible.builtin.stat:
    path: /etc/profile.d/99-hardware-acceleration.sh
  register: hardware_acceleration_check
  when:
    - intel_integrated is defined
    - intel_integrated.user_input == "y"

- name: Install hardware acceleration support
  become: true
  ansible.builtin.package:
    name:
      - intel-media-driver
      - libvdpau-va-gl
    state: present
  when:
    - intel_integrated is defined
    - intel_integrated.user_input == "y"

- name: Configure environment variables for hardware acceleration on Intel GPU
  become: true
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - /etc/profile.d/99-hardware-acceleration.sh
  vars:
    libva_driver_name: iHD
    vdpau_driver_name: va_gl
  when:
    - intel_integrated is defined
    - intel_integrated.user_input == "y"
    - not hardware_acceleration_check.stat.exists
