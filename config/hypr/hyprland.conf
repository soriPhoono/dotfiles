# Environment configuration options

source = ~/.config/hypr/modules/environment.conf

# General configuration settings

general {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more

  gaps_in = 8
  gaps_out = 16
  border_size = 3

  col = {
    active_border = rgba(94e2d5ff)
    inactive_border = rgba(1e1e2eff)
  }

  layout = dwindle

  cursor_inactive_timeout = 60

  resize_on_border = true
}

source = ~/.config/hypr/modules/monitors.conf

# Decoration configuration options

decoration {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more

  rounding = 8

  blur {
    enabled = true
    size = 5.8
    passes = 2
    new_optimizations = true
  }

  drop_shadow = yes
  shadow_range = 4
  shadow_render_power = 3
  col.shadow = rgba(313244FF)
}

# Animation configuration options

animations {
  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  enabled = yes

  bezier = overshot,0.10,0.9,0.1,1

  animation = windows, 1, 3, default, popin
  animation = windowsIn, 1, 3, default, popin 80%
  animation = windowsOut, 1, 3, default, popin 80%
  animation = windowsMove, 1, 3, default, slide
  animation = workspaces, 1, 5, overshot, slidevert
}

# Layout configuration options (master, dwindle)

dwindle {
  # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more

  pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = yes # you probably want this
}

master {
  # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more

  new_is_master = true
}

# Input configuration options

input {
  # For all categories, see https://wiki.hyprland.org/Configuring/Variables/

  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1
  repeat_rate = 30
  repeat_delay = 200
  sensitivity = 0.4
  accel_profile = "flat"
}

# Keybinding configuration options

binds {
  workspace_back_and_forth = false
  allow_workspace_cycles = false
}

source = ~/.config/hypr/modules/dispatchers.conf

# Window rules and opacity configuration options

source = ~/.config/hypr/modules/rules.conf

# Miscellaneous configuration options

misc {
  disable_hyprland_logo = true
  vfr = 1
  vrr = 1
  animate_manual_resizes = true
  animate_mouse_windowdragging = false
  enable_swallow = true
  focus_on_activate = true
  new_window_takes_over_fullscreen = 0
}

xwayland {
  force_zero_scaling = true
}

# Autostart programs

source = ~/.config/hypr/modules/autostart.conf
