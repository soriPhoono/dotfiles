#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# Some default env vars.
source = ~/.config/hypr/config/env.conf
source = ~/.config/hypr/colors.conf

source = ~/.config/hypr/config/monitors.conf

source = ~/.config/hypr/config/autostart.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1
    repeat_delay = 200
    repeat_rate = 30
    sensitivity = 0.4
    accel_profile = "flat"

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_fingers = 4
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    gaps_out = 5
    border_size = 1
    
    layout = dwindle

    cursor_inactive_timeout = 60

    resize_on_border = true
    no_focus_fallback = true
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 20
    
    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = on
        size = 5
        passes = 4
        brightness = 1
        noise = 0.1
        contrast = 1
    }

    drop_shadow = true
    shadow_ignore_window = true
    shadow_range = 20
    shadow_offset = 0 2
    shadow_render_power = 2
    col.shadow = rgba(313244ff)

    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 7, fluent_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

misc {
    vfr = 1
    vrr = 1
    focus_on_activate = true
    disable_hyprland_logo = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    force_hypr_chan = true
    new_window_takes_over_fullscreen = 2
    enable_swallow = true
}

xwayland {
    force_zero_scaling = true
}

binds {
    workspace_back_and_forth = false
    allow_workspace_cycles = false
}

layerrule = noanim, selection

source = ~/.config/hypr/config/dispatchers.conf
source=~/.config/hypr/config/rules.conf
source = ~/.config/hypr/config/opacity.conf
