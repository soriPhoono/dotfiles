######## Window rules ########
windowrule = noblur,.*

#windowrule = opacity 0.94 override 0.94 override, .*
windowrule = float, ^(steam)$
windowrule = float, ^(guifetch)$ # FlafyDev/guifetch
windowrule = pin, ^(showmethekey-gtk)$
windowrulev2 = tile,class:(wpsoffice)


# Dialogs
windowrule=float,title:^(Open File)(.*)$
windowrule=float,title:^(Select a File)(.*)$
windowrule=float,title:^(Choose wallpaper)(.*)$
windowrule=float,title:^(Open Folder)(.*)$
windowrule=float,title:^(Save As)(.*)$
windowrule=float,title:^(Library)(.*)$ 

# ags
layerrule = blur, session
layerrule = noanim, sideright
layerrule = noanim, sideleft

##### Chrome and Firefox

# Chrome class settings
windowrulev2 = workspace 3, class:^(google-chrome)$
windowrulev2 = float, class:^(google-chrome)$, title:^(.*Sign In - Google Accounts.*)
windowrulev2 = center, class:^(google-chrome)$, title:^(.*Sign In - Google Accounts.*)
windowrulev2 = size 688 756, class:^(google-chrome)$, title:^(.*Sign In - Google Accounts.*)

